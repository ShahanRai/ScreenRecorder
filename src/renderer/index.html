<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCapture Ultra</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style data-purpose="custom-styles">
    html { background: transparent; }
    body {
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      overflow: hidden;
      height: 100vh;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.05);
    }
    
    .record-button-outer {
      background: radial-gradient(circle, rgba(255,160,140,1) 0%, rgba(255,120,100,0.2) 70%, rgba(255,120,100,0) 100%);
      box-shadow: 0 0 40px rgba(255, 140, 120, 0.4);
      will-change: transform;
      transform: translateZ(0);
    }
    
    .record-button-inner {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: border-radius 0.3s, background 0.3s;
    }
    
    .settings-dropdown {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid #f1f5f9;
      background: white;
    }
    
    .settings-dropdown:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
    }

    .modal-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #fff;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }
    
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    .option-card-green {
      background-color: #f0fdf4;
      border-color: #bbf7d0;
    }

    .option-card-blue {
      background-color: #eff6ff;
      border-color: #bfdbfe;
    }

    .illustration-bg-green {
      background-color: #a7f3d0;
    }

    .illustration-bg-blue {
      background-color: #bfdbfe;
    }

    #recent-list {
      max-height: 160px;
      overflow-y: auto;
      padding: 2px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #recent-list::-webkit-scrollbar { width: 6px; }
    #recent-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    
    .source-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 10px;
    }
    
    .source-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      border: 2px solid transparent;
      cursor: pointer;
      width: 220px;
      transition: all 0.2s;
    }
    .source-item:focus,
    .source-item:hover {
      outline: none;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .source-item img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      object-fit: cover;
      aspect-ratio: 16/9;
      background: white;
    }
    .source-item span {
      text-align: center;
      font-size: 16px;
      color: #374151; /* gray-700 matching the mock */
      font-weight: 400; /* changed to normal matching mock */
      word-wrap: break-word;
    }
    
    .titlebar {
      width: 100%;
      height: 48px;
      -webkit-app-region: drag;
      position: absolute;
      top: 0; left: 0;
      display: flex;
      justify-content: flex-end;
      padding: 0 16px;
      align-items: center;
      z-index: 50;
    }
    .titlebar .controls {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }
    .titlebar button {
      background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 16px; transition: color 0.2s;
      width: 28px; height: 28px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .titlebar button:hover { color: #475569; background: rgba(0,0,0,0.05); }

    /* Custom scrollbar for modal */
    #sources-list::-webkit-scrollbar { width: 8px; }
    #sources-list::-webkit-scrollbar-track { background: transparent; }
    #sources-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes subtlePulse {
      0% { color: #94a3b8; text-shadow: 0 0 0px rgba(129, 140, 248, 0); }
      50% { color: #818cf8; text-shadow: 0 0 8px rgba(129, 140, 248, 0.4); }
      100% { color: #94a3b8; text-shadow: 0 0 0px rgba(129, 140, 248, 0); }
    }
    .creator-highlight {
      display: inline-block;
      animation: subtlePulse 3s infinite ease-in-out;
      font-weight: 600;
    }
    .status-text-styled {
      /* Initial state */
      color: #a5b4fc; /* Indigo 300 */
      transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-font-smoothing: antialiased;
      will-change: transform, color;
      transform: translateZ(0);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start pt-10 pb-4 px-4 relative overflow-hidden">
  
  <div class="titlebar">
    <div class="controls">
      <button id="minimize-btn" title="Minimize"><i class="fas fa-minus"></i></button>
      <button id="close-btn" title="Close"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <header class="w-full max-w-5xl flex items-center justify-center mb-6 mt-2 relative">
    <div class="flex items-center gap-3 text-indigo-400">
      <i class="fas fa-video text-3xl"></i>
      <h1 class="text-3xl font-semibold text-slate-700 tracking-tight">Screen<span class="text-indigo-400 font-light">Record</span></h1>
    </div>
  </header>

  <main class="w-full max-w-4xl flex flex-col items-center flex-grow overflow-hidden relative">
    <section class="flex flex-col items-center mb-4 mt-6">
      <div class="group flex flex-col items-center cursor-pointer select-none transition-transform duration-300 hover:scale-105" id="record-btn-container" data-purpose="record-button-container">
        <!-- Scale children via the container hover -->
        <div class="record-button-outer rounded-full p-6 transition-all duration-300 mb-2">
          <button id="record-btn" title="Toggle Recording" class="record-button-inner w-32 h-32 rounded-full bg-[#ff8a73] flex items-center justify-center relative shadow-lg shadow-coral-200">
            <div id="record-indicator" class="w-10 h-10 rounded-full bg-white transition-all duration-500"></div>
          </button>
        </div>
        <h2 id="status-text" class="status-text-styled text-2xl font-medium tracking-wide h-8 flex items-center justify-center text-indigo-300 transition-colors duration-300 group-hover:text-indigo-600">Start Record</h2>
      </div>
    </section>

    <section class="flex flex-row items-center justify-center gap-3 mb-6 w-full px-6 overflow-visible" data-purpose="settings-controls">
      <!-- Resolution -->
      <div class="custom-dropdown rounded-lg bg-white border border-slate-100 px-4 h-[44px] flex items-center justify-between gap-3 relative min-w-[200px] shadow-sm cursor-pointer hover:shadow-md transition-all settings-dropdown z-[100]" tabindex="0">
        <div class="flex items-center gap-2 pointer-events-none">
          <span class="text-slate-500 text-[12px] font-medium uppercase tracking-wider">Resolution:</span>
          <span class="text-indigo-400 text-sm selected-value font-semibold">Native</span>
        </div>
        <i class="fas fa-chevron-down text-indigo-300 text-xs transition-transform duration-200 dropdown-arrow pointer-events-none"></i>
        <div class="dropdown-menu absolute top-[calc(100%+8px)] left-0 w-full bg-white rounded-lg shadow-2xl border border-indigo-50 flex-col overflow-hidden z-[100] opacity-0 pointer-events-none transform -translate-y-2 transition-all duration-200">
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="native">Native</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="1920x1080">1080p (FHD)</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="1280x720">720p (HD)</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="3840x2160">4K (UHD)</div>
        </div>
        <input type="hidden" id="resolution" value="native">
      </div>

      <!-- FPS -->
      <div class="custom-dropdown rounded-lg bg-white border border-slate-100 px-4 h-[44px] flex items-center justify-between gap-3 relative min-w-[130px] shadow-sm cursor-pointer hover:shadow-md transition-all settings-dropdown z-[100]" tabindex="0">
        <div class="flex items-center gap-2 pointer-events-none">
          <span class="text-slate-500 text-[12px] font-medium uppercase tracking-wider">FPS:</span>
          <span class="text-indigo-400 text-sm selected-value font-semibold">30</span>
        </div>
        <i class="fas fa-chevron-down text-indigo-300 text-xs transition-transform duration-200 dropdown-arrow pointer-events-none"></i>
        <div class="dropdown-menu absolute top-[calc(100%+8px)] left-0 w-full bg-white rounded-lg shadow-2xl border border-indigo-50 flex-col overflow-hidden z-[100] opacity-0 pointer-events-none transform -translate-y-2 transition-all duration-200">
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="60">60</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="30">30</div>
        </div>
        <input type="hidden" id="fps" value="30">
      </div>

      <!-- Quality -->
      <div class="custom-dropdown rounded-lg bg-white border border-slate-100 px-4 h-[44px] flex items-center justify-between gap-3 relative min-w-[160px] shadow-sm cursor-pointer hover:shadow-md transition-all settings-dropdown z-[100]" tabindex="0">
        <div class="flex items-center gap-2 pointer-events-none">
          <span class="text-slate-500 text-[12px] font-medium uppercase tracking-wider">Quality:</span>
          <span class="text-indigo-400 text-sm selected-value font-semibold">High</span>
        </div>
        <i class="fas fa-chevron-down text-indigo-300 text-xs transition-transform duration-200 dropdown-arrow pointer-events-none"></i>
        <div class="dropdown-menu absolute top-[calc(100%+8px)] left-0 w-full bg-white rounded-lg shadow-2xl border border-indigo-50 flex-col overflow-hidden z-[100] opacity-0 pointer-events-none transform -translate-y-2 transition-all duration-200">
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="high">High</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="medium">Med</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="low">Low</div>
        </div>
        <input type="hidden" id="quality" value="high">
      </div>

      <!-- Format -->
      <div class="custom-dropdown rounded-lg bg-white border border-slate-100 px-4 h-[44px] flex items-center justify-between gap-3 relative min-w-[140px] shadow-sm cursor-pointer hover:shadow-md transition-all settings-dropdown z-[100]" tabindex="0">
        <div class="flex items-center gap-2 pointer-events-none">
          <span class="text-slate-500 text-[12px] font-medium uppercase tracking-wider">Ext:</span>
          <span class="text-indigo-400 text-sm selected-value font-semibold">WebM</span>
        </div>
        <i class="fas fa-chevron-down text-indigo-300 text-xs transition-transform duration-200 dropdown-arrow pointer-events-none"></i>
        <div class="dropdown-menu absolute top-[calc(100%+8px)] left-0 w-full bg-white rounded-lg shadow-2xl border border-indigo-50 flex-col overflow-hidden z-[100] opacity-0 pointer-events-none transform -translate-y-2 transition-all duration-200">
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="webm">WebM</div>
          <div class="dropdown-item px-4 py-3 hover:bg-indigo-50 text-indigo-500 text-sm font-medium transition-colors cursor-pointer" data-value="mp4">MP4</div>
        </div>
        <input type="hidden" id="format" value="webm">
      </div>
    </section>

    <section class="w-full max-w-2xl px-6 mt-2 mb-2 flex flex-col min-h-0 overflow-visible">
      <h3 class="text-slate-400 text-xs font-medium mb-3 uppercase tracking-widest px-1 shrink-0">Recent Recordings</h3>
      <div id="recent-list" class="no-scrollbar scroll-smooth">
      </div>
    </section>
    
    <footer class="mt-auto mb-1 text-slate-400 text-xs font-medium tracking-wide">
      1.1 Created by <span class="creator-highlight">Shahan Rai</span>
    </footer>
  </main>

  <div id="sources-modal" class="modal-overlay">
      <div class="w-full h-full flex flex-col items-center justify-start p-8 bg-white">
        <!-- Modal Title -->
        <h1 class="text-2xl font-semibold text-gray-700 mb-6 text-center shrink-0">Select Screen or Window</h1>
        
        <!-- Dynamic Source Grid -->
        <div id="sources-grid" class="source-grid mb-6 flex-grow"></div>
        
        <!-- Cancel Button -->
        <button id="cancel-selection" class="w-[280px] py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 text-base font-medium rounded-xl transition-all focus:outline-none focus:ring-4 focus:ring-gray-100 shrink-0">
          Cancel
        </button>
      </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
