<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording Overlay</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
    canvas { display: block; width: 100%; height: 100%; }
    .drawing-mode { cursor: crosshair; }
    
    /* Recording Border - Separate from canvas interaction */
    .recording-border {
        position: fixed;
        inset: 0;
        border: 5px solid #ef4444; 
        pointer-events: none;
        z-index: 1000;
        box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.3);
        animation: borderPulse 2s infinite ease-in-out;
    }
    @keyframes borderPulse {
        0% { opacity: 0.8; border-width: 5px; }
        50% { opacity: 1; border-width: 7px; }
        100% { opacity: 0.8; border-width: 5px; }
    }
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: auto; /* Ensure canvas receives events */
    }
  </style>
</head>
<body>
  <div class="recording-border"></div>
  <canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let mode = 'none'; // 'box', 'arrow', 'none'
  
  function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  let isDrawing = false;
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let currentY = 0;
  let shapes = [];

  window.api.onDrawMode((newMode) => {
      mode = newMode;
      if (mode === 'none') {
          document.body.classList.remove('drawing-mode');
      } else {
          document.body.classList.add('drawing-mode');
      }
  });

  canvas.addEventListener('mousedown', (e) => {
      if (mode === 'none') return;
      isDrawing = true;
      startX = e.clientX;
      startY = e.clientY;
      currentX = startX;
      currentY = startY;
  });

  canvas.addEventListener('mouseup', (e) => {
      if (!isDrawing) return;
      isDrawing = false;
      const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
      if (dist > 5) {
          shapes.push({
              type: mode,
              x1: startX,
              y1: startY,
              x2: e.clientX,
              y2: e.clientY,
              timestamp: Date.now()
          });
      }
      window.api.revertToMouse(); // Switch tool back automatically!
  });


  canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      currentX = e.clientX;
      currentY = e.clientY;
  });

  function renderLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const now = Date.now();
      
      shapes = shapes.filter(s => (now - s.timestamp) < 3000);
      
      shapes.forEach(s => {
          const age = now - s.timestamp;
          let alpha = 1;
          if (age > 2000) {
              alpha = 1 - ((age - 2000) / 1000); // Fades from 1 to 0 mapping 2s to 3s
          }
          ctx.globalAlpha = alpha;
          
          if (s.type === 'box') {
              drawBox(s.x1, s.y1, s.x2, s.y2);
          } else if (s.type === 'arrow') {
              drawArrow(s.x1, s.y1, s.x2, s.y2);
          }
      });
      ctx.globalAlpha = 1;

      if (isDrawing) {
          if (mode === 'box') {
              drawBox(startX, startY, currentX, currentY);
          } else if (mode === 'arrow') {
              drawArrow(startX, startY, currentX, currentY);
          }
      }
      
      requestAnimationFrame(renderLoop);
  }
  requestAnimationFrame(renderLoop);

  function drawBox(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 4;
      ctx.setLineDash([]);
      ctx.rect(x1, y1, x2 - x1, y2 - y1);
      ctx.stroke();
  }

  function drawArrow(x1, y1, x2, y2) {
      const headlen = 20; 
      const dx = x2 - x1;
      const dy = y2 - y1;
      const angle = Math.atan2(dy, dx);
      
      ctx.beginPath();
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 5;
      ctx.setLineDash([]);
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.beginPath();
      ctx.fillStyle = '#3b82f6';
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
      ctx.fill();
  }

  window.addEventListener('contextmenu', (e) => {
      if (mode !== 'none') {
          e.preventDefault();
      }
      shapes = [];
  });
</script>
</body>
</html>
